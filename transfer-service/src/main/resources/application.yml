spring:
  application:
    name: transfer-service
  config:
    import: optional:configserver:http://${CONFIG_HOST:localhost}:8888
  security:
    oauth2:
      client:
        registration:
          transfer-client:
            client-id: transfer-service
            client-secret: transfer-secret
            authorization-grant-type: client_credentials
            scope: openid
        provider:
          transfer-client:
            token-uri: http://${KEYCLOAK_INTERNAL_HOST:localhost}:${KEYCLOAK_INTERNAL_PORT:8180}/realms/bank-realm/protocol/openid-connect/token
      resourceserver:
        jwt:
          issuer-uri: http://${KEYCLOAK_ISSUER_HOST:localhost}:${KEYCLOAK_ISSUER_PORT:8180}/realms/bank-realm
          jwk-set-uri: http://${KEYCLOAK_INTERNAL_HOST:localhost}:${KEYCLOAK_INTERNAL_PORT:8180}/realms/bank-realm/protocol/openid-connect/certs
server:
  port: ${SERVER_PORT:8083}
accounts:
  service:
    url: lb://accounts-service
    connect-timeout: 3s
    timeout: 5s
resilience4j:
  circuitbreaker:
    instances:
      accountsService:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
notifications:
  service:
    url: lb://notifications-service
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
