spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      httpclient:
        connect-timeout: 3000
        response-timeout: 10s
      routes:
        - id: accountsRoute
          uri: http://accounts-service:8081
          predicates:
            - Path=/api/accounts/**
          filters:
            - StripPrefix=1
            - name: JwtTokenRelay
        - id: cashRoute
          uri: http://cash-service:8082
          predicates:
            - Path=/api/cash/**
          filters:
            - StripPrefix=1
            - name: JwtTokenRelay
        - id: transferRoute
          uri: http://transfer-service:8083
          predicates:
            - Path=/api/transfer/**
          filters:
            - StripPrefix=1
            - name: JwtTokenRelay
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://${KEYCLOAK_ISSUER_HOST:localhost}:${KEYCLOAK_ISSUER_PORT:8180}/realms/bank-realm
          jwk-set-uri: http://${KEYCLOAK_INTERNAL_HOST:localhost}:${KEYCLOAK_INTERNAL_PORT:8180}/realms/bank-realm/protocol/openid-connect/certs
server:
  port: ${SERVER_PORT:8080}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}
  tracing:
    sampling:
      probability: 1.0
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99
  endpoint:
    health:
      show-details: always
logstash:
  host: ${LOGSTASH_HOST:logstash}
  port: ${LOGSTASH_PORT:5000}
