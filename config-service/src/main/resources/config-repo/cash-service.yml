server:
  port: ${SERVER_PORT:8082}
spring:
  security:
    oauth2:
      client:
        registration:
          cash-client:
            client-id: cash-service
            client-secret: cash-secret
            authorization-grant-type: client_credentials
            scope: openid
        provider:
          cash-client:
            token-uri: http://${KEYCLOAK_INTERNAL_HOST:localhost}:${KEYCLOAK_INTERNAL_PORT:8180}/realms/bank-realm/protocol/openid-connect/token
accounts:
  service:
    url: lb://accounts-service
notifications:
  service:
    url: lb://notifications-service
resilience4j:
  circuitbreaker:
    instances:
      accountsService:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
