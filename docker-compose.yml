version: '3.8'
networks:
  bank-network:
    driver: bridge
volumes:
  postgres-data:
services:
  postgres:
    image: postgres:16-alpine
    container_name: bank-postgres
    environment:
      POSTGRES_DB: bank
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - bank-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bank"]
      interval: 10s
      timeout: 5s
      retries: 5
  kafka:
    image: apache/kafka:3.8.1
    container_name: bank-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - bank-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: bank-keycloak
    command:
      - start-dev
      - --http-port=8080
      - --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8180
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import
    networks:
      - bank-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
  gateway-service:
    build: ./gateway-service
    container_name: bank-gateway
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_INTERNAL_HOST: keycloak
      KEYCLOAK_INTERNAL_PORT: 8080
    networks:
      - bank-network
    depends_on:
      keycloak:
        condition: service_healthy
  accounts-service:
    build: ./accounts-service
    container_name: bank-accounts
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      KEYCLOAK_INTERNAL_HOST: keycloak
      KEYCLOAK_INTERNAL_PORT: 8080
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - bank-network
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      kafka:
        condition: service_healthy
  notifications-service:
    build: ./notifications-service
    container_name: bank-notifications
    ports:
      - "8084:8084"
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      KEYCLOAK_INTERNAL_HOST: keycloak
      KEYCLOAK_INTERNAL_PORT: 8080
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - bank-network
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      kafka:
        condition: service_healthy
  cash-service:
    build: ./cash-service
    container_name: bank-cash
    ports:
      - "8082:8082"
    environment:
      KEYCLOAK_INTERNAL_HOST: keycloak
      KEYCLOAK_INTERNAL_PORT: 8080
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - bank-network
    depends_on:
      accounts-service:
        condition: service_started
      notifications-service:
        condition: service_started
      kafka:
        condition: service_healthy
  transfer-service:
    build: ./transfer-service
    container_name: bank-transfer
    ports:
      - "8083:8083"
    environment:
      KEYCLOAK_INTERNAL_HOST: keycloak
      KEYCLOAK_INTERNAL_PORT: 8080
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - bank-network
    depends_on:
      accounts-service:
        condition: service_started
      notifications-service:
        condition: service_started
      kafka:
        condition: service_healthy
  front-app:
    build: ./front-app
    container_name: bank-front
    ports:
      - "8085:8085"
    environment:
      KEYCLOAK_ISSUER_HOST: localhost
      KEYCLOAK_ISSUER_PORT: 8180
      KEYCLOAK_INTERNAL_HOST: keycloak
      KEYCLOAK_INTERNAL_PORT: 8080
      # полный стек в compose: GATEWAY_URL=http://gateway-service:8080
      # гибридный режим (сервисы в K8s): GATEWAY_URL=http://host.docker.internal:30080
      GATEWAY_URL: ${GATEWAY_URL:-http://gateway-service:8080}
      ZIPKIN_ENDPOINT: http://host.docker.internal:30411/api/v2/spans
    networks:
      - bank-network
    depends_on:
      keycloak:
        condition: service_healthy
