apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "accounts-service.fullname" . }}
  labels:
    {{- include "accounts-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "accounts-service.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "accounts-service.labels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            - name: DB_HOST
              value: {{ .Values.db.host | quote }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "accounts-service.fullname" . }}-secret
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "accounts-service.fullname" . }}-secret
                  key: db-password
            - name: KEYCLOAK_INTERNAL_HOST
              value: {{ .Values.global.keycloak.internalHost | quote }}
            - name: KEYCLOAK_INTERNAL_PORT
              value: {{ .Values.global.keycloak.internalPort | quote }}
            - name: KEYCLOAK_ISSUER_HOST
              value: {{ .Values.global.keycloak.issuerHost | quote }}
            - name: KEYCLOAK_ISSUER_PORT
              value: {{ .Values.global.keycloak.issuerPort | quote }}
            - name: NOTIFICATIONS_SERVICE_URL
              value: http://notifications-service:8084
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_ACCOUNTS-CLIENT_CLIENT-SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "accounts-service.fullname" . }}-secret
                  key: client-secret
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
