fullnameOverride: accounts-service

replicaCount: 1

image:
  repository: local/accounts-service
  tag: latest
  pullPolicy: Never

service:
  type: ClusterIP
  port: 8081

db:
  host: postgres
  name: bank
  user: postgres
  password: postgres

kafka:
  bootstrapServers: kafka:9092

livenessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 60
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
