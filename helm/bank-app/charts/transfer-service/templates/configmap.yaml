apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "transfer-service.fullname" . }}-config
  labels:
    {{- include "transfer-service.labels" . | nindent 4 }}
data:
  KEYCLOAK_INTERNAL_HOST: {{ .Values.global.keycloak.internalHost | quote }}
  KEYCLOAK_INTERNAL_PORT: {{ .Values.global.keycloak.internalPort | quote }}
  KEYCLOAK_ISSUER_HOST: {{ .Values.global.keycloak.issuerHost | quote }}
  KEYCLOAK_ISSUER_PORT: {{ .Values.global.keycloak.issuerPort | quote }}
  ACCOUNTS_SERVICE_URL: http://accounts-service:8081
  KAFKA_BOOTSTRAP_SERVERS: {{ .Values.kafka.bootstrapServers | quote }}
  ZIPKIN_ENDPOINT: "http://zipkin:9411/api/v2/spans"
  LOGSTASH_HOST: "logstash"
  LOGSTASH_PORT: "5000"
