apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Values.fullnameOverride }}-test-connection"
  labels:
    app: {{ .Values.fullnameOverride }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: test
      image: busybox
      command: ['sh', '-c', 'nc -z {{ .Values.fullnameOverride }} 5432']
  restartPolicy: Never
