apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "zipkin.fullname" . }}-test-connection"
  labels:
    {{- include "zipkin.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: curl
      image: curlimages/curl:8.5.0
      command: ['curl', '-f', 'http://{{ include "zipkin.fullname" . }}:{{ .Values.service.port }}/health']
  restartPolicy: Never
