apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "grafana.fullname" . }}-test-connection"
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: curl
      image: curlimages/curl:8.5.0
      command: ['curl', '-f', 'http://{{ include "grafana.fullname" . }}:{{ .Values.service.port }}/api/health']
  restartPolicy: Never
