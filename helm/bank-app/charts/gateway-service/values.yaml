fullnameOverride: gateway-service

replicaCount: 1

image:
  repository: local/gateway-service
  tag: latest
  pullPolicy: Never

service:
  type: NodePort
  port: 8080
  nodePort: 30080

global:
  keycloak:
    internalHost: host.docker.internal
    internalPort: "8180"
    issuerHost: localhost
    issuerPort: "8180"

livenessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 60
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
