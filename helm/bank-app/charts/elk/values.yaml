elasticsearch:
  name: elasticsearch
  image:
    repository: docker.elastic.co/elasticsearch/elasticsearch
    tag: "8.12.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 9200
  javaOpts: "-Xms512m -Xmx512m"
  storage:
    type: emptyDir

logstash:
  name: logstash
  image:
    repository: docker.elastic.co/logstash/logstash
    tag: "8.12.0"
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    port: 5000
    nodePort: 30500
  javaOpts: "-Xms256m -Xmx256m"

kibana:
  name: kibana
  image:
    repository: docker.elastic.co/kibana/kibana
    tag: "8.12.0"
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    port: 5601
    nodePort: 30561
