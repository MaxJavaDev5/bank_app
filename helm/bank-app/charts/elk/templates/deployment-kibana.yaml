apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "elk.kibana.fullname" . }}
  labels:
    {{- include "elk.kibana.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "elk.kibana.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "elk.kibana.labels" . | nindent 8 }}
    spec:
      initContainers:
        - name: wait-for-elasticsearch
          image: curlimages/curl:8.5.0
          command:
            - sh
            - -c
            - until curl -sf http://{{ include "elk.elasticsearch.fullname" . }}:{{ .Values.elasticsearch.service.port }}; do sleep 2; done
      containers:
        - name: kibana
          image: "{{ .Values.kibana.image.repository }}:{{ .Values.kibana.image.tag }}"
          imagePullPolicy: {{ .Values.kibana.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.kibana.service.port }}
          env:
            - name: ELASTICSEARCH_HOSTS
              value: "http://{{ include "elk.elasticsearch.fullname" . }}:{{ .Values.elasticsearch.service.port }}"
          readinessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
