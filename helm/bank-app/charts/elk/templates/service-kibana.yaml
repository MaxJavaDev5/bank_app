apiVersion: v1
kind: Service
metadata:
  name: {{ include "elk.kibana.fullname" . }}
  labels:
    {{- include "elk.kibana.labels" . | nindent 4 }}
spec:
  type: {{ .Values.kibana.service.type }}
  selector:
    {{- include "elk.kibana.labels" . | nindent 4 }}
  ports:
    - port: {{ .Values.kibana.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if eq .Values.kibana.service.type "NodePort" }}
      nodePort: {{ .Values.kibana.service.nodePort }}
      {{- end }}
