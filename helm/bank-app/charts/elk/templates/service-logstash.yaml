apiVersion: v1
kind: Service
metadata:
  name: {{ include "elk.logstash.fullname" . }}
  labels:
    {{- include "elk.logstash.labels" . | nindent 4 }}
spec:
  type: {{ .Values.logstash.service.type }}
  selector:
    {{- include "elk.logstash.labels" . | nindent 4 }}
  ports:
    - port: {{ .Values.logstash.service.port }}
      targetPort: tcp
      protocol: TCP
      name: tcp
      {{- if eq .Values.logstash.service.type "NodePort" }}
      nodePort: {{ .Values.logstash.service.nodePort }}
      {{- end }}
