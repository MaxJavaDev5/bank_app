apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "elk.kibana.fullname" . }}-test-connection"
  labels:
    {{- include "elk.kibana.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: curl
      image: curlimages/curl:8.5.0
      command:
        - curl
        - -f
        - http://{{ include "elk.kibana.fullname" . }}:{{ .Values.kibana.service.port }}/api/status
  restartPolicy: Never
