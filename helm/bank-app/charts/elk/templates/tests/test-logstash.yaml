apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "elk.logstash.fullname" . }}-test-connection"
  labels:
    {{- include "elk.logstash.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: nc
      image: busybox:1.36
      command: ['nc', '-z', '{{ include "elk.logstash.fullname" . }}', '{{ .Values.logstash.service.port }}']
  restartPolicy: Never
