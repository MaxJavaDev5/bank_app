apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "elk.logstash.fullname" . }}
  labels:
    {{- include "elk.logstash.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "elk.logstash.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "elk.logstash.labels" . | nindent 8 }}
    spec:
      initContainers:
        - name: wait-for-elasticsearch
          image: curlimages/curl:8.5.0
          command:
            - sh
            - -c
            - until curl -sf http://{{ include "elk.elasticsearch.fullname" . }}:{{ .Values.elasticsearch.service.port }}; do sleep 2; done
      containers:
        - name: logstash
          image: "{{ .Values.logstash.image.repository }}:{{ .Values.logstash.image.tag }}"
          imagePullPolicy: {{ .Values.logstash.image.pullPolicy }}
          ports:
            - name: tcp
              containerPort: {{ .Values.logstash.service.port }}
          env:
            - name: LS_JAVA_OPTS
              value: {{ .Values.logstash.javaOpts | quote }}
          volumeMounts:
            - name: pipeline
              mountPath: /usr/share/logstash/pipeline/logstash.conf
              subPath: logstash.conf
          readinessProbe:
            tcpSocket:
              port: tcp
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: tcp
            initialDelaySeconds: 60
            periodSeconds: 15
      volumes:
        - name: pipeline
          configMap:
            name: {{ include "elk.logstash.fullname" . }}-config
