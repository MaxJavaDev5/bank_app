apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "elk.elasticsearch.fullname" . }}
  labels:
    {{- include "elk.elasticsearch.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "elk.elasticsearch.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "elk.elasticsearch.labels" . | nindent 8 }}
    spec:
      containers:
        - name: elasticsearch
          image: "{{ .Values.elasticsearch.image.repository }}:{{ .Values.elasticsearch.image.tag }}"
          imagePullPolicy: {{ .Values.elasticsearch.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.elasticsearch.service.port }}
          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: {{ .Values.elasticsearch.javaOpts | quote }}
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
            runAsUser: 1000
          volumeMounts:
            - name: data
              mountPath: /usr/share/elasticsearch/data
          readinessProbe:
            httpGet:
              path: /_cluster/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_cluster/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
      volumes:
        - name: data
          {{- if eq .Values.elasticsearch.storage.type "pvc" }}
          persistentVolumeClaim:
            claimName: {{ include "elk.elasticsearch.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
