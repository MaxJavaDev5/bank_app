apiVersion: v1
kind: Service
metadata:
  name: {{ include "elk.elasticsearch.fullname" . }}
  labels:
    {{- include "elk.elasticsearch.labels" . | nindent 4 }}
spec:
  type: {{ .Values.elasticsearch.service.type }}
  selector:
    {{- include "elk.elasticsearch.labels" . | nindent 4 }}
  ports:
    - port: {{ .Values.elasticsearch.service.port }}
      targetPort: http
      protocol: TCP
      name: http
