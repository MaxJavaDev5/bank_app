fullnameOverride: cash-service

replicaCount: 1

image:
  repository: local/cash-service
  tag: latest
  pullPolicy: Never

service:
  type: ClusterIP
  port: 8082

oauth:
  clientSecret: cash-secret

kafka:
  bootstrapServers: kafka:9092

livenessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 60
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
